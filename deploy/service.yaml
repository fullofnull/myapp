apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  namespace: myapp
  labels:                  # --- 추가 ---
    app: myapp             # 프로메테우스가 이 라벨을 보고 찾아옵니다.
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
    - name: http-metrics   # --- 이름 추가 (매우 중요!) ---
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 32080